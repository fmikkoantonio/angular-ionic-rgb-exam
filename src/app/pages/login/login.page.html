@if(isLoading){
<app-loading message="Logging in..."></app-loading>
}@else{
<ion-content [fullscreen]="true">
  <div class="flex h-full items-center justify-center">
    <div class="w-full max-w-xs px-6 flex flex-col gap-20">
      <!-- Logo -->

      <div class="flex justify-center">
        <div class="flex items-center">
          <img src="assets/images/youtube.png" class="w-20 h-20 rounded-xl" />

          <img
            src="assets/images/spotify.png"
            class="w-20 h-20 -ml-5 mt-8 z-10 rounded-xl"
          />

          <img
            src="assets/images/facebook.png"
            class="w-20 h-20 -ml-5 mt-16 z-20 rounded-xl"
          />
        </div>
      </div>

      <!-- Form -->

      <div class="flex flex-col gap-2">
        <ion-input
          fill="outline"
          placeholder="Username"
          class="[--text-align:center]"
          [formControl]="username"
        >
        </ion-input>

        @if(username.invalid && (username.dirty || username.touched)){

        <div class="flex justify-center">
          <p class="text-xs text-red-500">{{ getUsernameErrorMessage() }}</p>
        </div>

        }

        <ion-button
          expand="block"
          class="[--background:green] [--color:white]"
          [disabled]="username.invalid"
          (click)="openPinModal()"
        >
          Enter
        </ion-button>
      </div>
    </div>
  </div>

  <!-- PIN MODAL -->

  <ion-modal [isOpen]="isPinModalOpen" (didDismiss)="closePinModal()">
    <ng-template>
      <div class="flex h-full items-center justify-center bg-black/40">
        <div class="bg-white rounded-xl w-80 overflow-hidden">
          <div class="p-6">
            <h2 class="text-lg font-semibold text-center">Verify It's You</h2>

            <p class="text-sm text-gray-500 text-center mt-2">
              Please enter your 6-digit PIN
            </p>

            <!-- PIN DISPLAY -->

            <div class="flex justify-center gap-4 mt-8">
              @for(digit of getPinDisplay(); track $index){

              <span class="text-4xl"> {{ digit }} </span>

              }
            </div>

            <!-- Hidden Input -->

            <ion-input
              #pinInput
              type="password"
              inputmode="numeric"
              maxlength="6"
              class="absolute opacity-0"
              [formControl]="pin"
            >
            </ion-input>
          </div>

          <!-- Buttons -->

          <div
            class="grid grid-cols-2 border-t border-gray-200 divide-x divide-gray-200"
          >
            <button
              class="h-14 flex items-center justify-center font-medium text-green-600"
              [disabled]="pin.invalid"
              (click)="submitLogin()"
            >
              Enter
            </button>

            <button
              class="h-14 flex items-center justify-center font-medium text-red-500"
              (click)="closePinModal()"
            >
              Close
            </button>
          </div>
        </div>
      </div>
    </ng-template>
  </ion-modal> </ion-content
>}
